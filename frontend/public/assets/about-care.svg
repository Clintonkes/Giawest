<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img" aria-label="Service care illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fffe"/>
      <stop offset="100%" stop-color="#eaf9f4"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f6fffe"/>
    </linearGradient>
    <linearGradient id="navyCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#29476e"/>
      <stop offset="100%" stop-color="#1f3a5f"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4fb6b0"/>
      <stop offset="100%" stop-color="#3a9e98"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="rgba(31,58,95,0.15)"/>
    </filter>
    <filter id="shadowSm" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="rgba(31,58,95,0.12)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bg)"/>

  <!-- Background decorative blobs -->
  <circle cx="750" cy="120" r="140" fill="#4fb6b0" fill-opacity=".06"/>
  <circle cx="150" cy="500" r="110" fill="#1f3a5f" fill-opacity=".04"/>
  <circle cx="800" cy="500" r="80" fill="#ddf5ee" fill-opacity=".8"/>

  <!-- LEFT: Service card / document panel -->
  <rect x="60" y="70" width="300" height="420" rx="28" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="60" y="70" width="300" height="420" rx="28" fill="none" stroke="#ddf5ee" stroke-width="1.5"/>

  <!-- Card header stripe -->
  <rect x="60" y="70" width="300" height="80" rx="28" fill="url(#tealGrad)"/>
  <rect x="60" y="118" width="300" height="32" fill="url(#tealGrad)"/>

  <!-- Header icons and text -->
  <rect x="88" y="92" width="36" height="36" rx="10" fill="white" fill-opacity=".22"/>
  <path d="M100 103 L112 103 M100 109 L108 109 M100 115 L112 115" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
  <rect x="136" y="97" width="90" height="10" rx="5" fill="white" fill-opacity=".9"/>
  <rect x="136" y="113" width="65" height="8" rx="4" fill="white" fill-opacity=".6"/>

  <!-- Status dot -->
  <circle cx="326" cy="108" r="8" fill="white" fill-opacity=".3"/>
  <circle cx="326" cy="108" r="5" fill="white" fill-opacity=".8"/>

  <!-- Card body rows -->
  <!-- Row 1 -->
  <rect x="84" y="172" width="28" height="28" rx="8" fill="#ddf5ee"/>
  <rect x="90" y="180" width="16" height="12" rx="3" fill="#4fb6b0" fill-opacity=".6"/>
  <rect x="122" y="175" width="115" height="10" rx="5" fill="#1f3a5f" fill-opacity=".7"/>
  <rect x="122" y="192" width="158" height="8" rx="4" fill="#1f3a5f" fill-opacity=".3"/>

  <!-- Row divider -->
  <rect x="84" y="213" width="248" height="1" fill="#e8f4f0"/>

  <!-- Row 2 -->
  <rect x="84" y="225" width="28" height="28" rx="8" fill="#ddf5ee"/>
  <circle cx="98" cy="239" r="8" fill="#4fb6b0" fill-opacity=".5"/>
  <circle cx="98" cy="239" r="4" fill="#4fb6b0" fill-opacity=".8"/>
  <rect x="122" y="228" width="100" height="10" rx="5" fill="#1f3a5f" fill-opacity=".7"/>
  <rect x="122" y="245" width="145" height="8" rx="4" fill="#1f3a5f" fill-opacity=".3"/>

  <!-- Row divider -->
  <rect x="84" y="266" width="248" height="1" fill="#e8f4f0"/>

  <!-- Row 3 -->
  <rect x="84" y="278" width="28" height="28" rx="8" fill="#ddf5ee"/>
  <path d="M92 284 L104 284 M92 290 L100 290 M92 296 L104 296" stroke="#4fb6b0" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <rect x="122" y="281" width="130" height="10" rx="5" fill="#1f3a5f" fill-opacity=".7"/>
  <rect x="122" y="298" width="170" height="8" rx="4" fill="#1f3a5f" fill-opacity=".3"/>

  <!-- Row divider -->
  <rect x="84" y="319" width="248" height="1" fill="#e8f4f0"/>

  <!-- Completion status section -->
  <rect x="84" y="330" width="248" height="60" rx="14" fill="#f0fdf9"/>
  <rect x="100" y="346" width="60" height="8" rx="4" fill="#4fb6b0" fill-opacity=".7"/>
  <rect x="100" y="360" width="200" height="8" rx="4" fill="#e8f4f0"/>
  <rect x="100" y="360" width="145" height="8" rx="4" fill="url(#tealGrad)"/>
  <rect x="100" y="374" width="50" height="7" rx="3" fill="#4fb6b0" fill-opacity=".5"/>

  <!-- Action button area -->
  <rect x="84" y="408" width="248" height="46" rx="23" fill="url(#tealGrad)"/>
  <rect x="160" y="425" width="96" height="12" rx="6" fill="white" fill-opacity=".9"/>

  <!-- RIGHT: Navy booking/summary card -->
  <rect x="430" y="100" width="340" height="240" rx="26" fill="url(#navyCard)" filter="url(#shadow)"/>

  <!-- Card header area -->
  <rect x="458" y="126" width="140" height="12" rx="6" fill="white" fill-opacity=".85"/>
  <rect x="458" y="146" width="200" height="10" rx="5" fill="white" fill-opacity=".5"/>
  <rect x="458" y="162" width="160" height="10" rx="5" fill="white" fill-opacity=".35"/>

  <!-- Right icon -->
  <rect x="720" y="118" width="26" height="26" rx="8" fill="white" fill-opacity=".12"/>
  <circle cx="733" cy="131" r="7" fill="none" stroke="#4fb6b0" stroke-width="2"/>
  <path d="M730 131 L732 133 L737 127" fill="none" stroke="#4fb6b0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Info chips row -->
  <rect x="458" y="192" width="80" height="26" rx="13" fill="white" fill-opacity=".12"/>
  <rect x="464" y="200" width="68" height="10" rx="5" fill="#4fb6b0" fill-opacity=".7"/>
  <rect x="550" y="192" width="90" height="26" rx="13" fill="white" fill-opacity=".12"/>
  <rect x="556" y="200" width="78" height="10" rx="5" fill="white" fill-opacity=".5"/>
  <rect x="652" y="192" width="80" height="26" rx="13" fill="#4fb6b0" fill-opacity=".25"/>
  <rect x="658" y="200" width="68" height="10" rx="5" fill="white" fill-opacity=".6"/>

  <!-- Divider -->
  <rect x="458" y="234" width="284" height="1" fill="white" fill-opacity=".1"/>

  <!-- Stats row in dark card -->
  <rect x="458" y="250" width="60" height="50" rx="10" fill="white" fill-opacity=".08"/>
  <rect x="468" y="258" width="40" height="16" rx="4" fill="white" fill-opacity=".8"/>
  <rect x="465" y="280" width="46" height="8" rx="4" fill="white" fill-opacity=".35"/>

  <rect x="534" y="250" width="60" height="50" rx="10" fill="white" fill-opacity=".08"/>
  <rect x="544" y="258" width="40" height="16" rx="4" fill="white" fill-opacity=".8"/>
  <rect x="541" y="280" width="46" height="8" rx="4" fill="white" fill-opacity=".35"/>

  <rect x="610" y="250" width="60" height="50" rx="10" fill="white" fill-opacity=".08"/>
  <rect x="620" y="258" width="40" height="16" rx="4" fill="white" fill-opacity=".8"/>
  <rect x="617" y="280" width="46" height="8" rx="4" fill="white" fill-opacity=".35"/>

  <rect x="686" y="250" width="56" height="50" rx="10" fill="#4fb6b0" fill-opacity=".25"/>
  <rect x="695" y="258" width="38" height="16" rx="4" fill="white" fill-opacity=".8"/>
  <rect x="692" y="280" width="42" height="8" rx="4" fill="white" fill-opacity=".45"/>


  <rect x="430" y="370" width="160" height="100" rx="18" fill="none" stroke="#e8f4f0"/>
  <!-- Avatar -->
  <circle cx="460" cy="396" r="16" fill="#ddf5ee"/>
  <circle cx="460" cy="391" r="7" fill="#4fb6b0" fill-opacity=".4"/>
  <ellipse cx="460" cy="407" rx="11" ry="7" fill="#4fb6b0" fill-opacity=".25"/>
  <rect x="484" y="389" width="88" height="9" rx="4" fill="#1f3a5f" fill-opacity=".7"/>
  <rect x="484" y="403" width="65" height="7" rx="3" fill="#1f3a5f" fill-opacity=".3"/>
  <!-- Stars -->
  <rect x="448" y="420" width="8" height="8" rx="2" fill="#4fb6b0" fill-opacity=".7"/>
  <rect x="462" y="420" width="8" height="8" rx="2" fill="#4fb6b0" fill-opacity=".7"/>
  <rect x="476" y="420" width="8" height="8" rx="2" fill="#4fb6b0" fill-opacity=".7"/>
  <rect x="490" y="420" width="8" height="8" rx="2" fill="#4fb6b0" fill-opacity=".7"/>
  <rect x="504" y="420" width="8" height="8" rx="2" fill="#4fb6b0" fill-opacity=".4"/>
  <rect x="448" y="436" width="110" height="7" rx="3" fill="#1f3a5f" fill-opacity=".2"/>
  <rect x="448" y="449" width="80" height="7" rx="3" fill="#1f3a5f" fill-opacity=".15"/>

  <rect x="608" y="370" width="162" height="100" rx="18" fill="white" filter="url(#shadowSm)"/>
  <rect x="608" y="370" width="162" height="100" rx="18" fill="none" stroke="#e8f4f0"/>
  <circle cx="638" cy="396" r="16" fill="#ddf5ee"/>
  <circle cx="638" cy="391" r="7" fill="#1f3a5f" fill-opacity=".3"/>
  <ellipse cx="638" cy="407" rx="11" ry="7" fill="#1f3a5f" fill-opacity=".12"/>
  <rect x="662" y="389" width="88" height="9" rx="4" fill="#1f3a5f" fill-opacity=".7"/>
  <rect x="662" y="403" width="65" height="7" rx="3" fill="#1f3a5f" fill-opacity=".3"/>
  <rect x="626" y="420" width="8" height="8" rx="2" fill="#4fb6b0" fill-opacity=".7"/>
  <rect x="640" y="420" width="8" height="8" rx="2" fill="#4fb6b0" fill-opacity=".7"/>
  <rect x="654" y="420" width="8" height="8" rx="2" fill="#4fb6b0" fill-opacity=".7"/>
  <rect x="668" y="420" width="8" height="8" rx="2" fill="#4fb6b0" fill-opacity=".7"/>
  <rect x="682" y="420" width="8" height="8" rx="2" fill="#4fb6b0" fill-opacity=".7"/>
  <rect x="626" y="436" width="110" height="7" rx="3" fill="#1f3a5f" fill-opacity=".2"/>
  <rect x="626" y="449" width="80" height="7" rx="3" fill="#1f3a5f" fill-opacity=".15"/>

  <!-- Eco badge floating bottom left of main card -->
  <rect x="44" y="440" width="250" height="88" rx="20" fill="white" filter="url(#shadow)"/>
  <rect x="44" y="440" width="250" height="88" rx="20" fill="none" stroke="#ddf5ee" stroke-width="1.5"/>
  <rect x="62" y="458" width="44" height="44" rx="12" fill="#ddf5ee"/>
  <!-- Leaf icon -->
  <path d="M84 463 Q96 463 96 475 Q96 487 84 487 Q84 475 72 475 Q72 463 84 463 Z" fill="#4fb6b0" fill-opacity=".6"/>
  <line x1="84" y1="463" x2="84" y2="487" stroke="#4fb6b0" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="118" y="462" width="120" height="10" rx="5" fill="#1f3a5f" fill-opacity=".75"/>
  <rect x="118" y="478" width="155" height="8" rx="4" fill="#1f3a5f" fill-opacity=".35"/>
  <rect x="118" y="492" width="110" height="8" rx="4" fill="#1f3a5f" fill-opacity=".22"/>

  <!-- Decorative bottom bar -->
  <rect x="200" y="586" width="500" height="6" rx="3" fill="#4fb6b0" fill-opacity=".12"/>
</svg>

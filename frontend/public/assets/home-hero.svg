  <!-- Item 1 -->
  <rect x="104" y="280" width="322" height="58" rx="14" fill="white" stroke="#e8f4f0" stroke-width="1"/>
  <rect x="120" y="298" width="30" height="30" rx="9" fill="#ddf5ee"/>
  <!-- House icon suggestion -->
  <rect x="127" y="308" width="16" height="12" rx="3" fill="#4fb6b0" fill-opacity=".7"/>
  <rect x="123" y="306" width="24" height="4" rx="2" fill="#4fb6b0" fill-opacity=".5"/>
  <rect x="162" y="291" width="110" height="9" rx="4" fill="#1f3a5f" fill-opacity=".7"/>
  <rect x="162" y="306" width="155" height="8" rx="4" fill="#1f3a5f" fill-opacity=".3"/>
  <rect x="162" y="318" width="90" height="7" rx="3" fill="#1f3a5f" fill-opacity=".2"/>
  <rect x="382" y="296" width="30" height="30" rx="8" fill="#f0fdf9"/>
  <rect x="388" y="308" width="18" height="6" rx="3" fill="#4fb6b0" fill-opacity=".6"/>

  <!-- Item 2 -->
  <rect x="104" y="350" width="322" height="58" rx="14" fill="white" stroke="#e8f4f0" stroke-width="1"/>
  <rect x="120" y="368" width="30" height="30" rx="9" fill="#ddf5ee"/>
  <rect x="127" y="375" width="16" height="16" rx="4" fill="#4fb6b0" fill-opacity=".6"/>
  <rect x="127" y="380" width="8" height="6" rx="2" fill="white" fill-opacity=".7"/>
  <rect x="162" y="361" width="95" height="9" rx="4" fill="#1f3a5f" fill-opacity=".7"/>
  <rect x="162" y="376" width="145" height="8" rx="4" fill="#1f3a5f" fill-opacity=".3"/>
  <rect x="162" y="388" width="75" height="7" rx="3" fill="#1f3a5f" fill-opacity=".2"/>
  <rect x="382" y="366" width="30" height="30" rx="8" fill="#f0fdf9"/>
  <rect x="388" y="378" width="18" height="6" rx="3" fill="#4fb6b0" fill-opacity=".6"/>

  <!-- Item 3 -->
  <rect x="104" y="420" width="322" height="58" rx="14" fill="white" stroke="#e8f4f0" stroke-width="1"/>
  <rect x="120" y="438" width="30" height="30" rx="9" fill="#ddf5ee"/>
  <circle cx="135" cy="453" r="8" fill="#4fb6b0" fill-opacity=".5"/>

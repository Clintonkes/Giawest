  <circle cx="422" cy="92" r="9" fill="none" stroke="#4fb6b0" stroke-width="2"/>
  <line x1="422" y1="87" x2="422" y2="92" stroke="#4fb6b0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="422" y1="92" x2="426" y2="95" stroke="#4fb6b0" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="448" y="80" width="120" height="10" rx="5" fill="#1f3a5f" fill-opacity=".8"/>
  <rect x="448" y="96" width="90" height="8" rx="4" fill="#1f3a5f" fill-opacity=".35"/>


<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Polished cleaning service app illustration">
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdf9"/>
      <stop offset="100%" stop-color="#ddf5ee"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fffe"/>
    </linearGradient>
    <linearGradient id="navyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#29476e"/>
      <stop offset="100%" stop-color="#1f3a5f"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4fb6b0"/>
      <stop offset="100%" stop-color="#3a9e98"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgba(31,58,95,0.18)"/>
    </filter>
    <filter id="shadowSm" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(31,58,95,0.14)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#heroBg)"/>

  <!-- Decorative circles -->
  <circle cx="680" cy="80" r="120" fill="#4fb6b0" fill-opacity=".07"/>
  <circle cx="680" cy="80" r="72" fill="#4fb6b0" fill-opacity=".09"/>
  <circle cx="120" cy="520" r="100" fill="#1f3a5f" fill-opacity=".05"/>

  <!-- Main App Card / Phone Mockup -->
  <rect x="80" y="40" width="370" height="500" rx="32" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="80" y="40" width="370" height="500" rx="32" fill="none" stroke="#e5f2ef" stroke-width="1.5"/>

  <!-- App header bar -->
  <rect x="80" y="40" width="370" height="72" rx="32" fill="url(#navyGrad)"/>
  <rect x="80" y="82" width="370" height="30" fill="url(#navyGrad)"/>

  <!-- App logo / brand in header -->
  <rect x="108" y="62" width="28" height="28" rx="8" fill="#4fb6b0"/>
  <text x="122" y="81" font-family="system-ui,sans-serif" font-size="14" font-weight="800" fill="white" text-anchor="middle">G</text>
  <rect x="148" y="66" width="80" height="10" rx="5" fill="white" fill-opacity=".85"/>
  <rect x="148" y="82" width="55" height="8" rx="4" fill="#4fb6b0" fill-opacity=".7"/>

  <!-- Header right - avatar circle -->
  <circle cx="412" cy="76" r="20" fill="#4fb6b0" fill-opacity=".25"/>
  <circle cx="412" cy="76" r="14" fill="white" fill-opacity=".35"/>

  <!-- Section: Upcoming booking card -->
  <rect x="104" y="128" width="322" height="110" rx="18" fill="url(#tealGrad)" filter="url(#shadowSm)"/>
  <!-- Calendar icon area -->
  <rect x="124" y="148" width="40" height="40" rx="10" fill="white" fill-opacity=".2"/>
  <rect x="130" y="155" width="28" height="4" rx="2" fill="white" fill-opacity=".8"/>
  <rect x="130" y="163" width="20" height="4" rx="2" fill="white" fill-opacity=".6"/>
  <rect x="130" y="171" width="24" height="4" rx="2" fill="white" fill-opacity=".6"/>
  <!-- Booking text -->
  <rect x="178" y="150" width="100" height="10" rx="5" fill="white" fill-opacity=".9"/>
  <rect x="178" y="166" width="140" height="8" rx="4" fill="white" fill-opacity=".65"/>
  <rect x="178" y="180" width="80" height="8" rx="4" fill="white" fill-opacity=".5"/>
  <!-- Status badge -->
  <rect x="312" y="148" width="82" height="26" rx="13" fill="white" fill-opacity=".2"/>
  <rect x="322" y="155" width="62" height="12" rx="6" fill="white" fill-opacity=".75"/>
  <!-- Bottom row -->
  <rect x="124" y="214" width="65" height="8" rx="4" fill="white" fill-opacity=".7"/>
  <rect x="200" y="214" width="85" height="8" rx="4" fill="white" fill-opacity=".5"/>

  <!-- Section title -->
  <rect x="104" y="258" width="90" height="10" rx="5" fill="#1f3a5f" fill-opacity=".25"/>


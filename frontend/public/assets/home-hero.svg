  <rect x="430" y="430" width="195" height="64" rx="18" fill="white" filter="url(#shadowSm)"/>
  <rect x="430" y="430" width="195" height="64" rx="18" fill="none" stroke="#e5f2ef" stroke-width="1"/>
  <rect x="448" y="448" width="28" height="28" rx="8" fill="#ddf5ee"/>
  <!-- Shield icon -->
  <path d="M462 452 L468 454 L468 462 Q468 467 462 469 Q456 467 456 462 L456 454 Z" fill="none" stroke="#4fb6b0" stroke-width="1.8"/>
  <path d="M459 461 L461 463 L466 457" fill="none" stroke="#4fb6b0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="488" y="450" width="115" height="10" rx="5" fill="#1f3a5f" fill-opacity=".8"/>
  <rect x="488" y="466" width="85" height="8" rx="4" fill="#1f3a5f" fill-opacity=".35"/>

  <!-- Stats row (right side middle) -->
  <rect x="490" y="180" width="90" height="90" rx="16" fill="white" filter="url(#shadowSm)"/>
  <rect x="490" y="180" width="90" height="90" rx="16" fill="none" stroke="#e8f4f0"/>
  <text x="535" y="218" font-family="system-ui,sans-serif" font-size="22" font-weight="800" fill="#1f3a5f" text-anchor="middle">4.9</text>
  <rect x="510" y="224" width="50" height="8" rx="4" fill="#4fb6b0" fill-opacity=".5"/>
  <rect x="507" y="238" width="56" height="7" rx="3" fill="#1f3a5f" fill-opacity=".3"/>
  <rect x="515" y="250" width="40" height="7" rx="3" fill="#1f3a5f" fill-opacity=".2"/>

  <rect x="600" y="200" width="90" height="90" rx="16" fill="white" filter="url(#shadowSm)"/>
  <rect x="600" y="200" width="90" height="90" rx="16" fill="none" stroke="#e8f4f0"/>
  <text x="645" y="238" font-family="system-ui,sans-serif" font-size="22" font-weight="800" fill="#1f3a5f" text-anchor="middle">98%</text>
  <rect x="615" y="248" width="60" height="8" rx="4" fill="#4fb6b0" fill-opacity=".5"/>
  <rect x="616" y="262" width="58" height="7" rx="3" fill="#1f3a5f" fill-opacity=".3"/>
  <rect x="622" y="274" width="46" height="7" rx="3" fill="#1f3a5f" fill-opacity=".2"/>

  <!-- Progress bar element -->
  <rect x="490" y="300" width="200" height="52" rx="14" fill="white" filter="url(#shadowSm)"/>
  <rect x="490" y="300" width="200" height="52" rx="14" fill="none" stroke="#e8f4f0"/>
  <rect x="508" y="316" width="164" height="8" rx="4" fill="#e8f4f0"/>
  <rect x="508" y="316" width="120" height="8" rx="4" fill="url(#tealGrad)"/>
  <rect x="508" y="330" width="90" height="6" rx="3" fill="#1f3a5f" fill-opacity=".2"/>

  <!-- Bottom decorative line -->
  <rect x="350" y="570" width="300" height="6" rx="3" fill="#4fb6b0" fill-opacity=".12"/>

  <rect x="218" y="519" width="14" height="10" rx="3" fill="#1f3a5f" fill-opacity=".25"/>
  <rect x="302" y="519" width="14" height="10" rx="3" fill="#1f3a5f" fill-opacity=".25"/>
  <rect x="388" y="519" width="14" height="10" rx="3" fill="#1f3a5f" fill-opacity=".25"/>

  <!-- Floating badge card: Same-day handling (top right) -->
  <rect x="390" y="60" width="200" height="64" rx="18" fill="white" filter="url(#shadowSm)"/>
  <rect x="390" y="60" width="200" height="64" rx="18" fill="none" stroke="#e5f2ef" stroke-width="1"/>
  <rect x="408" y="78" width="28" height="28" rx="8" fill="#ddf5ee"/>

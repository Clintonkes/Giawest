  <rect x="162" y="431" width="120" height="9" rx="4" fill="#1f3a5f" fill-opacity=".7"/>
  <rect x="162" y="446" width="160" height="8" rx="4" fill="#1f3a5f" fill-opacity=".3"/>
  <rect x="162" y="458" width="100" height="7" rx="3" fill="#1f3a5f" fill-opacity=".2"/>
  <rect x="382" y="436" width="30" height="30" rx="8" fill="#f0fdf9"/>
  <rect x="388" y="448" width="18" height="6" rx="3" fill="#4fb6b0" fill-opacity=".6"/>

